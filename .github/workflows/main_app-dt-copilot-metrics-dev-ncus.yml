name: Build and deploy Node.js app to Azure Web App - app-dt-copilot-metrics-dev-ncus

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        run: |
          npm install
          npm run build
          sed -i '/.output/d' .gitignore

      - name: Verify .output exists
        run: ls -la .output/server/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_81C4A44461CE4BBC8B886E1F9397987E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C603874E3BEE4C12BEF76A90DF7708AF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_83DDEAD2B5EA4B859E7B64716196CA01 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-dt-copilot-metrics-dev-ncus'
          slot-name: 'Production'
          package: .
